<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RVIP Driver Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      padding: 24px;
    }
    button { font-family: inherit; }

    /* ── Sign-in screen ─────────────────────────────────────────── */
    #signin {
      max-width: 420px;
      margin: 12vh auto;
      background: #181818;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    #signin h1 { font-size: 24px; color: #d4af37; margin-bottom: 8px; }
    #signin p { color: #888; margin-bottom: 24px; font-size: 14px; }
    #signin input {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
      font-family: ui-monospace, Menlo, monospace;
      margin-bottom: 14px;
    }
    #signin button {
      width: 100%;
      background: #d4af37;
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }
    #signin button:hover { background: #e0b842; }
    #signin .err {
      color: #f87171;
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── Main admin layout ──────────────────────────────────────── */
    #app { display: none; }
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 22px; font-weight: 900; color: #d4af37; }
    .header .status { font-size: 12px; color: #888; flex: 1; }
    .header button {
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
    }
    .panel {
      background: #181818;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 16px;
    }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: bold;
      font-size: 14px;
    }
    .refresh-btn {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 11px;
      cursor: pointer;
    }

    .driver-row {
      background: #222;
      border: 1px solid #2a2a2a;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      width: 100%;
      margin-bottom: 6px;
    }
    .driver-row:hover { background: #2a2a2a; }
    .driver-row.active { border-color: #d4af37; background: #2a2410; }
    .driver-row .name { font-weight: bold; }
    .driver-row .sub { color: #888; font-size: 11px; }
    .dot-verified { color: #4ade80; }
    .dot-unverified { color: #facc15; }

    .detail-empty { color: #777; padding: 40px 20px; text-align: center; }

    .driver-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .driver-avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-weight: bold;
      font-size: 22px;
      overflow: hidden;
    }
    .driver-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: bold;
      display: inline-block;
    }
    .badge-verified { background: #16331f; color: #4ade80; }
    .badge-suspended { background: #3a1717; color: #f87171; }
    .btn-primary {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 11px;
    }
    .btn-secondary {
      background: transparent;
      color: #f87171;
      border: 1px solid #f87171;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
    }

    h3.section {
      font-size: 13px;
      color: #d4af37;
      letter-spacing: 1.5px;
      margin: 0 0 12px;
    }

    .doc-row {
      background: #111;
      border: 1px solid #222;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .doc-row .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .doc-row .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .doc-row a, .doc-row button {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-block;
    }
    .btn-view { background: #222; color: #fff; }
    .btn-approve { background: #16331f; color: #4ade80; border: 1px solid #1f5a2e; }
    .btn-reject { background: #3a1717; color: #f87171; border: 1px solid #5a1f1f; }

    .status-approved { color: #4ade80; }
    .status-rejected { color: #f87171; }
    .status-pending { color: #facc15; }

    .payout-card {
      background: #111;
      border: 1px solid #222;
      padding: 16px;
      border-radius: 8px;
    }
    .payout-total {
      font-size: 24px;
      font-weight: bold;
    }
    .total-gold { color: #d4af37; }
    .total-green { color: #4ade80; }
    .btn-paid {
      background: #4ade80;
      color: #000;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      font-size: 12px;
    }
    .err { color: #f87171; font-size: 12px; }
  </style>
</head>
<body>

  <!-- ───── SIGN IN ───── -->
  <div id="signin">
    <h1>RVIP Driver Admin</h1>
    <p>Enter your admin token to continue.</p>
    <input id="token-input" type="password" placeholder="Admin token (long hex string)" autofocus />
    <button onclick="signin()">Sign In</button>
    <div id="signin-err" class="err"></div>
    <p style="font-size: 11px; color: #555; margin-top: 18px;">
      You set this token as <code>ADMIN_API_TOKEN</code> when deploying the backend.
    </p>
  </div>

  <!-- ───── APP ───── -->
  <div id="app">
    <div class="header">
      <h1>RVIP Driver Admin</h1>
      <span class="status" id="rvip-status">Connecting…</span>
      <button onclick="signout()">Sign Out</button>
    </div>
    <div class="grid">
      <div class="panel">
        <div class="panel-title">
          <span>Drivers</span>
          <button class="refresh-btn" onclick="loadDrivers()">Refresh</button>
        </div>
        <div id="driver-list">Loading…</div>
      </div>
      <div class="panel" id="driver-detail">
        <div class="detail-empty">Pick a driver on the left.</div>
      </div>
    </div>
  </div>

<script>
//
// ── Token sign-in (stored in browser localStorage) ──────────────────
//
function signin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) {
    document.getElementById('signin-err').textContent = 'Token required';
    return;
  }
  // Verify the token before storing — call the API once
  fetch('/api/drivers', { headers: { 'Authorization': 'Bearer ' + t } })
    .then(r => {
      if (r.status === 401) {
        document.getElementById('signin-err').textContent = 'Invalid token';
        return;
      }
      if (!r.ok) {
        document.getElementById('signin-err').textContent = 'Backend error: ' + r.status;
        return;
      }
      localStorage.setItem('rvip_admin_token', t);
      showApp();
    })
    .catch(e => {
      document.getElementById('signin-err').textContent = 'Error: ' + e.message;
    });
}

function signout() {
  localStorage.removeItem('rvip_admin_token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('signin').style.display = 'block';
  document.getElementById('token-input').value = '';
  document.getElementById('signin-err').textContent = '';
}

function showApp() {
  document.getElementById('signin').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadDrivers();
}

function token() {
  return localStorage.getItem('rvip_admin_token');
}

// Boot
window.addEventListener('DOMContentLoaded', () => {
  if (token()) {
    showApp();
  }
  document.getElementById('token-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') signin();
  });
});

//
// ── API client ─────────────────────────────────────────────────────
//
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: {
      'Authorization': 'Bearer ' + token(),
      'Content-Type': 'application/json',
      ...(opts.headers || {}),
    },
  });
  if (r.status === 401) {
    signout();
    throw new Error('Session expired');
  }
  if (!r.ok) {
    const t = await r.text();
    throw new Error(`API ${r.status}: ${t}`);
  }
  return r.json();
}

//
// ── Driver list ────────────────────────────────────────────────────
//
async function loadDrivers() {
  const list = document.getElementById('driver-list');
  list.innerHTML = 'Loading…';
  try {
    const { drivers } = await api('/api/drivers');
    document.getElementById('rvip-status').textContent =
      `Connected · ${drivers.length} driver${drivers.length === 1 ? '' : 's'}`;
    document.getElementById('rvip-status').style.color = '#4ade80';
    list.innerHTML = '';
    drivers.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    for (const d of drivers) {
      const btn = document.createElement('button');
      btn.className = 'driver-row';
      const verifyDot = d.isVerified
        ? '<span class="dot-verified">●</span>'
        : '<span class="dot-unverified">○</span>';
      btn.innerHTML = `
        <div>
          <div class="name">${esc(d.name) || '(no name)'}</div>
          <div class="sub">${esc(d.phone) || ''}</div>
        </div>
        <div>${verifyDot}</div>
      `;
      btn.onclick = () => loadDriver(d.id);
      list.appendChild(btn);
    }
  } catch (e) {
    document.getElementById('rvip-status').textContent = 'Error: ' + e.message;
    document.getElementById('rvip-status').style.color = '#f87171';
    list.innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

//
// ── Driver detail ──────────────────────────────────────────────────
//
async function loadDriver(driverId) {
  const detail = document.getElementById('driver-detail');
  detail.innerHTML = 'Loading…';
  try {
    const { driver, documents } = await api('/api/drivers/' + driverId);
    const currentWeek = currentWeekKey();
    const payout = await api(`/api/drivers/${driverId}/payouts/${currentWeek}`).catch(() => null);

    let html = `
      <div class="driver-header">
        <div class="driver-avatar">
          ${driver.photoURL
            ? `<img src="${esc(driver.photoURL)}">`
            : (driver.name || '?').charAt(0).toUpperCase()}
        </div>
        <div>
          <div style="font-size:18px;font-weight:bold;">${esc(driver.name) || '(no name)'}</div>
          <div style="color:#888;font-size:13px;">${esc(driver.email) || ''} · ${esc(driver.phone) || ''}</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;">
        ${driver.isVerified
          ? '<span class="badge badge-verified">VERIFIED</span>'
          : `<button onclick="doVerify('${driverId}')" class="btn-primary">Mark Verified</button>`
        }
        ${driver.isActive === false
          ? '<span class="badge badge-suspended">SUSPENDED</span>'
          : `<button onclick="doSuspend('${driverId}')" class="btn-secondary">Suspend</button>`
        }
      </div>

      <h3 class="section">DOCUMENTS</h3>
      <div style="margin-bottom:24px;">
    `;
    const required = [
      { type: 'dl_front', label: 'Driver License (Front)' },
      { type: 'coi', label: 'Commercial Insurance' },
      { type: 'registration', label: 'Vehicle Registration' },
      { type: 'tnc_inspection', label: 'TNC Inspection' },
    ];
    for (const req of required) {
      const doc = documents.find(d => d.docType === req.type);
      if (!doc) {
        html += `
          <div class="doc-row">
            <div class="head"><span>${req.label}</span><span style="color:#777;">Not uploaded</span></div>
          </div>`;
        continue;
      }
      const statusCls = 'status-' + doc.verificationStatus;
      html += `
        <div class="doc-row">
          <div class="head">
            <span><strong>${req.label}</strong> · <span class="${statusCls}">${doc.verificationStatus}</span></span>
          </div>
          <div class="actions">
            <a href="${esc(doc.viewerUrl)}" target="_blank" class="btn-view">View</a>
            <button onclick="doApproveDoc('${driverId}','${req.type}')" class="btn-approve">Approve</button>
            <button onclick="doRejectDoc('${driverId}','${req.type}')" class="btn-reject">Reject</button>
          </div>
          ${doc.rejectionReason
            ? `<div style="color:#f87171;font-size:11px;margin-top:6px;">Reason: ${esc(doc.rejectionReason)}</div>`
            : ''
          }
        </div>`;
    }
    html += `</div>`;

    if (payout) {
      const isPaid = !!payout.paid;
      html += `
        <h3 class="section">THIS WEEK · ${esc(payout.week)}</h3>
        <div class="payout-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-size:13px;color:#888;">
              ${payout.trips} trip${payout.trips === 1 ? '' : 's'} · Tips $${payout.tips.toFixed(0)}
              ${payout.cancelFees > 0 ? ' · Cancel fees $' + payout.cancelFees.toFixed(0) : ''}
            </span>
            <span class="payout-total ${isPaid ? 'total-green' : 'total-gold'}">$${payout.total.toFixed(2)}</span>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${isPaid
              ? `<span class="badge badge-verified">PAID via ${esc(payout.paid.method) || '?'}</span>
                 <button onclick="doUnmarkPaid('${driverId}','${payout.week}')" class="btn-secondary">Undo</button>`
              : `<button onclick="doMarkPaid('${driverId}','${payout.week}', ${payout.total})" class="btn-paid">Mark Paid ($${payout.total.toFixed(2)})</button>`
            }
          </div>
        </div>
      `;
    }

    detail.innerHTML = html;
  } catch (e) {
    detail.innerHTML = `<div class="err">${esc(e.message)}</div>`;
  }
}

//
// ── Actions ────────────────────────────────────────────────────────
//
async function doVerify(id) {
  await api(`/api/drivers/${id}/verify`, { method: 'POST' });
  loadDriver(id); loadDrivers();
}
async function doSuspend(id) {
  const reason = prompt('Suspension reason (optional)') || '';
  await api(`/api/drivers/${id}/suspend`, {
    method: 'POST', body: JSON.stringify({ suspended: true, reason }),
  });
  loadDriver(id); loadDrivers();
}
async function doApproveDoc(id, type) {
  await api(`/api/drivers/${id}/docs/${type}/approve`, { method: 'POST' });
  loadDriver(id);
}
async function doRejectDoc(id, type) {
  const reason = prompt('Reject reason:') || '';
  if (!reason) return;
  await api(`/api/drivers/${id}/docs/${type}/reject`, {
    method: 'POST', body: JSON.stringify({ reason }),
  });
  loadDriver(id);
}
async function doMarkPaid(id, week, amount) {
  const method = prompt('Payment method (venmo / zelle / cash / etc.)', 'venmo');
  if (!method) return;
  await api(`/api/drivers/${id}/payouts/${week}/mark-paid`, {
    method: 'POST',
    body: JSON.stringify({ amount, method, note: '' }),
  });
  loadDriver(id);
}
async function doUnmarkPaid(id, week) {
  if (!confirm('Mark this week unpaid?')) return;
  await api(`/api/drivers/${id}/payouts/${week}/mark-unpaid`, { method: 'POST' });
  loadDriver(id);
}

//
// ── Helpers ────────────────────────────────────────────────────────
//
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"]/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;',
  }[c]));
}

function currentWeekKey() {
  const now = new Date();
  const target = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
  const dayNum = (target.getUTCDay() + 6) % 7;
  target.setUTCDate(target.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(target.getUTCFullYear(), 0, 4));
  const week = 1 + Math.round(((target - firstThursday) / 86400000 - 3 + (firstThursday.getUTCDay() + 6) % 7) / 7);
  return `${target.getUTCFullYear()}_W${String(week).padStart(2, '0')}`;
}
</script>
</body>
</html>
